<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#b5451b"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="g" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0L0 0 0 80" fill="none" stroke="rgba(154,55,22,0.28)" stroke-width="1"/>
    </pattern>
    <!-- Right-side glow -->
    <radialGradient id="rg" cx="80%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#c8552a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b5451b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>
  <rect width="1200" height="630" fill="url(#rg)"/>

  <!-- Weathervane mark (top-left) -->
  <g transform="translate(80, 76)">
    <line x1="0" y1="20" x2="40" y2="20" stroke="#f5f0e8" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="20" x2="32" y2="13" stroke="#f5f0e8" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="20" x2="32" y2="27" stroke="#f5f0e8" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="40" x2="20" y2="0" stroke="#f5f0e8" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="0" x2="13" y2="8" stroke="#f5f0e8" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="0" x2="27" y2="8" stroke="#f5f0e8" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="134" y="111" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700"
        letter-spacing="5" fill="#f5f0e8">VANE</text>

  <!-- Eyebrow -->
  <text x="80" y="220" font-family="ui-monospace,monospace" font-size="14" letter-spacing="4"
        fill="rgba(245,240,232,0.6)" text-transform="uppercase">AGENT IDENTITY INFRASTRUCTURE</text>

  <!-- Main headline -->
  <text x="80" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="88"
        font-weight="800" letter-spacing="-3" fill="#f5f0e8">Give your agents</text>
  <text x="80" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="88"
        font-weight="800" letter-spacing="-3" fill="#f5f0e8">identity.</text>

  <!-- Tagline -->
  <text x="80" y="500" font-family="ui-monospace,monospace" font-size="20" letter-spacing="0.5"
        fill="rgba(245,240,232,0.72)">Cryptographic passports for AI agents · Ed25519 · Merkle-attested</text>

  <!-- Divider -->
  <line x1="80" y1="548" x2="1120" y2="548" stroke="rgba(245,240,232,0.18)" stroke-width="1"/>

  <!-- Bottom meta -->
  <text x="80" y="582" font-family="ui-monospace,monospace" font-size="16" letter-spacing="2"
        fill="rgba(245,240,232,0.45)">VERIFIABLE BY ANYONE · TRUSTED EVERYWHERE</text>
  <text x="1120" y="582" font-family="ui-monospace,monospace" font-size="16" letter-spacing="1"
        fill="rgba(245,240,232,0.45)" text-anchor="end">docs.vane.build</text>
</svg>
